<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>Giới thiệu bản thân</title>
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.4.1/css/bootstrap.min.css">
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f8f9fa;
    }
    .profile {
      margin-top: 50px;
    }
    .profile img {
      border-radius: 50%;
      width: 200px;
      height: 200px;
    }
    .profile h2 {
      margin-top: 20px;
      font-weight: bold;
    }
    .forgot{
            text-decoration: none;
            color: rgb(255, 0, 0);
                }
                .forgot:hover{
                    color: rgb(255, 42, 0);
                }
                   .btn-login {
            background-color: #ff0000;
            color: white;
            padding: 8px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            text-decoration: none;
            display: inline-block;
        }
        .btn-login:hover {
            background-color: #cc0000;
        }
  </style>
</head>
<body style="text-align: center; background-image: url(https://i.pinimg.com/736x/c7/ba/b1/c7bab1051bab89e9367182ab4dfcf1d8.jpg);">

<div>
  <img src="https://i.pinimg.com/736x/9b/4b/75/9b4b7568e66bdbc66b24a7eaed155fec.jpg" alt="Chúc Mừng Đăng Nhập">
  <div style="text-align: center; margin-top: 20px;">
    <!-- Khung chữ chúc mừng -->
    <div style="
        background: rgba(255, 255, 255, 0.9); 
        padding: 10px 20px; 
        border-radius: 10px; 
        display: inline-block; 
        border: 2px solid #1abc9c;
        box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    ">
        <h3 style="margin: 0; color: #000; font-size: 20px;">
            Chúc Mừng Bạn Đã Đăng Nhập Thành Công
        </h3>
    </div>

    <!-- Nút Quay Lại (đặt ngay bên dưới với khoảng cách nhỏ) -->
    <div style="margin-top: 10px;"> 
        <button type="button" 
                onclick="window.location.href='index.html';" 
                style="
                    background-color: #ff0000; 
                    color: white; 
                    border: none; 
                    padding: 8px 20px; 
                    border-radius: 5px; 
                    font-weight: bold;
                    cursor: pointer;
                ">
            Quay Lại Để Đăng Nhập
        </button>
    </div>
</div>
</div>
<div class="container-fluid bg-3 text-center">
  <span style="margin-right: 30px;">
 <button" type="submit" class="btn-login" onclick="window.location.href= 'index.html'; return false;" style="margin-left: 60%;">Quay Lại Để Đăng Nhập</button></span>
 
 
 
</body>
</html>
