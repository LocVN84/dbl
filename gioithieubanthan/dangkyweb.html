<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="utf-8">
    <title>Thông tin đăng ký</title>
    <style>
        body {
            background-color: #f0f2f5;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .container {
            width: 700px;
            background: #fff;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .header {
            background-color: #8db054; /* Màu xanh lá đặc trưng */
            text-align: center;
            padding: 20px;
            font-size: 32px;
            font-weight: bold;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            padding: 20px 40px;
            display: block; /* Cho phép padding cho table body */
        }

        tr {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
        }

        .label-cell {
            width: 150px;
            font-size: 16px;
        }

        .input-cell {
            flex: 1;
        }

        /* Style cho các ô nhập liệu gạch chân */
        input[type="text"], 
        input[type="date"], 
        input[type="tel"], 
        input[type="email"], 
        select {
            width: 100%;
            border: none;
            border-bottom: 1.5px solid #333;
            padding: 5px 0;
            outline: none;
            font-size: 14px;
            color: #555;
        }

        /* Group Radio & Checkbox */
        .group-control {
            display: flex;
            gap: 15px;
            font-size: 14px;
        }

        /* Mô tả sơ lược */
        .textarea-row {
            display: block;
            margin-top: 10px;
        }

        textarea {
            width: 100%;
            height: 100px;
            margin-top: 10px;
            border: 1px solid #333;
            resize: none;
        }

        /* Nút bấm */
        .button-group {
            text-align: center;
            padding: 20px 0 30px 0;
        }

        .btn {
            background-color: #8db054;
            border: 1px solid #333;
            padding: 10px 25px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            margin: 0 10px;
            font-size: 16px;
        }

        .btn:hover {
            filter: brightness(90%);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">Thông tin đăng ký</div>
    
    <div style="padding: 20px 40px;">
        <table>
            <tr>
                <td class="label-cell">Họ tên:</td>
                <td class="input-cell"><input type="text" placeholder="Nhập họ tên"></td>
            </tr>
            <tr>
                <td class="label-cell">Ngày sinh:</td>
                <td class="input-cell"><input type="date"></td>
            </tr>
            <tr>
                <td class="label-cell">Giới tính:</td>
                <td class="input-cell">
                    <div class="group-control">
                        <label><input type="radio" name="gender"> Nam</label>
                        <label><input type="radio" name="gender"> Nữ</label>
                    </div>
                </td>
            </tr>
            <tr>
                <td class="label-cell">Địa chỉ:</td>
                <td class="input-cell"><input type="text" placeholder="Nhập địa chỉ"></td>
            </tr>
            <tr>
                <td class="label-cell">MSSV:</td>
                <td class="input-cell"><input type="text" placeholder="Nhập mã số sinh viên"></td>
            </tr>
            <tr>
                <td class="label-cell">Lớp:</td>
                <td class="input-cell">
                    <select>
                        <option>DA25TTA</option>
                        <option>DA25TTB</option>
                        <option>DA25TTC</option>
                        <option>DA25TTD</option>
                    </select>
                </td>
            </tr>
            <tr>
                <td class="label-cell">Số điện thoại:</td>
                <td class="input-cell"><input type="tel" placeholder="Nhập số điện thoại"></td>
            </tr>
            <tr>
                <td class="label-cell">Email:</td>
                <td class="input-cell"><input type="email" placeholder="Nhập email"></td>
            </tr>
            <tr>
                <td class="label-cell">Ảnh đại diện:</td>
                <td class="input-cell"><input type="file"></td>
            </tr>
            <tr>
                <td class="label-cell">Sở trường:</td>
                <td class="input-cell">
                    <div class="group-control">
                        <label><input type="checkbox"> Thiết kế web</label>
                        <label><input type="checkbox"> Lập trình web</label>
                        <label><input type="checkbox"> Thành thạo tiếng Trung</label>
                    </div>
                </td>
            </tr>
            <tr class="textarea-row">
                <td colspan="2">Mô tả sơ lược:</td>
                <td><textarea style="height: 50%; width: 270%;"></textarea></td>
            </tr>
        </table>

        <div class="button-group">
           <a href="dangnhapweb.html"> <button type="reset" class="btn ">Hủy bỏ</button></a> 
             <a href="dangnhapweb.html"> <button type="submit" class="btn">Đăng ký</button> </a>
        </div>
    </div>
</div>

</body>
</html>
