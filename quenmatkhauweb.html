<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>
            Đăng nhập
        </title>
        <style>
                 .row-flex {
                  display: flex;
                 justify-content:space-between;
                align-items: center;
                            }
                .forgot{
            text-decoration: none;
            color: rgb(255, 0, 0);
                }
                .forgot:hover{
                    color: rgb(255, 42, 0);
                }
                .btn-login {
            background-color: #ff0000;
            color: white;
            padding: 8px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            text-decoration: none;
            display: inline-block;
        }
        .btn-login:hover {
            background-color: #cc0000;
        }
            .guima {
            background-color: #ffffff;
            color: rgb(0, 0, 0);
            padding: 4px 6px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            text-decoration: none;
            display: inline-block;
        }
        .guima:hover {
            background-color: #8dff7c;
            
        }
      .xacnhan {
    background-color: #ffffff;
    color: rgb(0, 0, 0);
    padding: 2px 2px;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-weight: bold;
    text-decoration: none;
    display: inline-block;
    transition: all 0.3s ease;
    font-size: 14px;
}

/* Khi rê chuột */
.xacnhan:hover {
    background-color: #8dff7c;
}

#xacnhan-check:checked + .xacnhan {
    background-color: #8dff7c;
    color: black;
}

#xacnhan-check:checked + .xacnhan::after {
    content: " ✔";
    color: green;
    font-weight: bold;
}
        </style>
    </head>
    <body style="background-color: #B2FbA5;">
        <form method="post">
            <table align="center" ; width = "75%" style="background-color:#b1eff0;  border: 2px solid rgb(255, 0, 0) ; margin: auto ; font-family:Georgia, 'Times New Roman', Times, serif ">
                <tr>
                   <td colspan="3" style="padding: 1%; text-align: center;"><h3>Quên Mật Khẩu</h3></td>
                </tr>
                <tr>
                    <td style="padding: 1%;">Nhập Gmail của bạn</td>
                    <td><input type="text" name="txttendangnhap" style=" width:70% ; margin-left: 10%;" placeholder="NHẬP GMAIL..."></td>
                     <td><button type="button" class="guima">Gửi Mã</button></td>
                </tr>
                 <tr>
                    <td style="padding: 1%;">Xác Nhận Mã:</td>
                    <td><input type="text" name="txttendangnhap" style=" width:70% ; margin-left: 10%;" placeholder="NHẬP MÃ..."></td>
                    <td> <!-- Checkbox ẩn -->
                        <input type="checkbox" id="xacnhan-check" style="display:none;">
  
                         <!-- Label đóng vai trò nút -->
                        <label for="xacnhan-check" class="xacnhan">Xác Nhận</label></td>
                </tr>
               
                     <td colspan="3" style="text-align: center;">
                        <label>
                            <input type="checkbox" name="txtkhungghinho" style="margin-left: 7%;"> Ghi nhớ mật khẩu cho lan đăng nhập tới
                    </label>
                       
                         </td>
                        </tr>
                    <tr>
                        <td colspan="3" style="padding: 2%; text-align: center;">
                            <a type="button" class="btn-login" href="dangnhapweb.html">Đăng Nhập </a>
                        </td>
                                
                    </tr>
                        
            </table>
        </form>
    </body>
</html>
